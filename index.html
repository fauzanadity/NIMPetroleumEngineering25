<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DATABASE TEKNIK PERMINYAKAN</title>
    <style>
      :root {
        --primary-orange: #776cef; /* Ungu sesuai kode terakhirmu */
        --dark-black: #0f0f0f;
        --light-black: #1a1a1a;
        --text-white: #e0e0e0;
        --correct-green: #00ff88;
        --wrong-red: #ff4d4d;
      }

      * {
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background-color: var(--dark-black);
        color: var(--text-white);
        margin: 0;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      h1 {
        color: var(--primary-orange);
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 8px;
        text-align: center;
      }

      .subtitle {
        color: #888;
        margin-bottom: 35px;
        text-align: center;
      }

      .container {
        width: 100%;
        max-width: 1100px;
        display: none;
        margin: auto;
      }

      .active {
        display: block;
      }

      /* TOGGLE SWITCH */
      .toggle-container {
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--light-black);
        padding: 15px;
        border-radius: 12px;
        width: fit-content;
        margin-left: auto;
        margin-right: auto;
      }

      .switch {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 24px;
        margin: 0 15px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #333;
        transition: 0.4s;
        border-radius: 24px;
        border: 1px solid var(--primary-orange);
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 4px;
        bottom: 3px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: var(--primary-orange);
      }
      input:checked + .slider:before {
        transform: translateX(24px);
      }

      /* MENU GRID */
      .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 18px;
        width: 100%;
        margin-top: 20px;
      }

      .main-btn {
        background-color: var(--light-black);
        color: var(--primary-orange);
        border: 2px solid var(--primary-orange);
        padding: 22px;
        cursor: pointer;
        border-radius: 14px;
        font-weight: 600;
        text-align: center;
        transition: 0.25s ease;
      }

      .main-btn:hover {
        background-color: var(--primary-orange);
        color: var(--dark-black);
        transform: translateY(-4px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      }

      .db-access-btn {
        background-color: #252525;
        border-color: #444;
        color: #fff;
        width: 100%;
        margin-top: 20px;
      }

      /* GAME TABLE */
      .game-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 10px;
        margin-top: 10px;
      }

      .game-table th {
        color: var(--primary-orange);
        text-align: left;
        padding: 15px;
        font-size: 0.85rem;
        letter-spacing: 1px;
      }

      .game-table tr {
        background-color: var(--light-black);
      }
      .game-table td {
        padding: 14px 15px;
      }
      .game-table tr td:first-child {
        border-radius: 10px 0 0 10px;
      }
      .game-table tr td:last-child {
        border-radius: 0 10px 10px 0;
      }

      /* INPUT */
      input[type="text"] {
        width: 100%;
        padding: 11px;
        border-radius: 8px;
        border: 1px solid #333;
        background-color: #000;
        color: white;
        font-size: 0.95rem;
        transition: 0.2s;
      }

      input:focus {
        outline: none;
        border-color: var(--primary-orange);
      }
      input.correct {
        border-color: var(--correct-green) !important;
        color: var(--correct-green);
      }
      input.wrong {
        border-color: var(--wrong-red) !important;
      }

      .search-box {
        width: 100%;
        padding: 14px;
        font-size: 1rem;
        margin-bottom: 20px;
        border: 2px solid var(--primary-orange);
        background: #000;
        color: #fff;
        border-radius: 10px;
      }

      .back-nav {
        margin-bottom: 20px;
        cursor: pointer;
        color: var(--primary-orange);
        font-weight: 500;
      }

      @media (max-width: 768px) {
        .menu-grid {
          grid-template-columns: 1fr;
        }
        .game-table thead {
          display: none;
        }
        .game-table tr {
          display: block;
          padding: 18px;
          margin-bottom: 10px;
        }
        .game-table td {
          display: block;
          width: 100%;
          padding: 6px 0;
        }
        .game-table td::before {
          content: attr(data-label);
          color: var(--primary-orange);
          font-size: 0.75rem;
          display: block;
          margin-bottom: 2px;
        }
      }
    </style>
  </head>

      function init() {
        const btnContainer = document.getElementById("range-buttons");
        for (let i = 0; i < studentsData.length; i += 10) {
          const start = i + 1;
          const end = Math.min(i + 10, studentsData.length);
          const btn = document.createElement("div");
          btn.className = "main-btn";
          btn.innerHTML = `NIM 12225${String(start).padStart(
            3,
            "0"
          )} - ...${String(end).padStart(3, "0")}`;
          btn.onclick = () => startGame(i, end);
          btnContainer.appendChild(btn);
        }
        searchDatabase();
      }

      function showScreen(screenId) {
        document
          .querySelectorAll(".container")
          .forEach((c) => c.classList.remove("active"));
        document.getElementById(screenId).classList.add("active");
        window.scrollTo(0, 0);
      }

      function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

        showScreen("screen-game");
        document.getElementById("game-title").innerText = `Rentang NIM ${
          start + 1
        } - ${end}`;

        let slice = studentsData.slice(start, end);
        if (document.getElementById("shuffle-toggle").checked) {
          slice = shuffleArray(slice);
        }

        const tbody = document.getElementById("game-body");
        tbody.innerHTML = "";

        slice.forEach((s, idx) => {
          const tr = document.createElement("tr");
          const isNimMissing = Math.random() < 0.5;
          const rowId = `row-${idx}`;

          tr.innerHTML = `
            <td data-label="NIM">${
              isNimMissing
                ? `<input type="text" oninput="val(this, '${rowId}')" data-ans="${s.NIM}">`
                : s.NIM
            }</td>
            <td data-label="Nama Mahasiswa">${
              !isNimMissing
                ? `<input type="text" oninput="val(this, '${rowId}')" data-ans="${s.Name}">`
                : s.Name
            }</td>
            <td data-label="Asal Tinggal"><input type="text" oninput="val(this, '${rowId}')" data-ans="${
            s.Origin
          }"></td>
            <td data-label="Status" class="dot" id="${rowId}-status">⚪</td>
          `;
          tbody.appendChild(tr);
        });
      }

      function val(input, rowId) {
        const user = input.value.trim().toLowerCase();
        const ans = input.getAttribute("data-ans").toLowerCase();

        if (user === ans) {
          input.classList.add("correct");
          input.classList.remove("wrong");
        } else {
          input.classList.remove("correct");
          if (user.length >= ans.length * 0.5) input.classList.add("wrong");
        }

        const row = input.closest("tr");
        const inputs = row.querySelectorAll("input");
        let correctCount = 0;
        inputs.forEach((i) => {
          if (
            i.value.trim().toLowerCase() ===
            i.getAttribute("data-ans").toLowerCase()
          )
            correctCount++;
        });
        document.getElementById(`${rowId}-status`).innerText =
          correctCount === inputs.length ? "✅" : "⚪";
      }

      function searchDatabase() {
        const query = document.getElementById("db-search").value.toLowerCase();
        const tbody = document.getElementById("db-body");
        tbody.innerHTML = "";
        const filtered = studentsData.filter(
          (s) =>
            s.Name.toLowerCase().includes(query) ||
            s.NIM.toString().includes(query)
        );
        filtered.forEach((s) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${s.NIM}</td><td>${s.Name}</td><td>${s.Origin}</td>`;
          tbody.appendChild(tr);
        });
      }

      init();
    </script>
  </body>
</html>
